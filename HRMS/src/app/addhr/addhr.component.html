
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users"></i></div>
      <h2>HRMS</h2>
      <p>Human Resource Management</p>
    </div>
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" class="menu-item">
        <i class="fas fa-chart-line"></i><span>Dashboard</span>
      </a>
      <a routerLink="/employeereport" class="menu-item">
        <i class="fas fa-users-cog"></i><span>Employee Report</span>
      </a>
      <a routerLink="/addemployee" class="menu-item">
        <i class="fas fa-user-plus"></i><span>Add Employee</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/leavesreport" class="menu-item">
        <i class="fas fa-calendar-alt"></i><span>Leaves Report</span>
      </a>
      <a routerLink="/addleaves" class="menu-item">
        <i class="fas fa-calendar-check"></i><span>Add Leaves</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/salaryreport" class="menu-item">
        <i class="fas fa-dollar-sign"></i><span>Salary Report</span>
      </a>
      <a routerLink="/addsalary" class="menu-item">
        <i class="fas fa-coins"></i><span>Add Salary</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/addhr" class="menu-item active">
        <i class="fas fa-user-tie"></i><span>Add HR</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/logout" class="menu-item logout">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Add New HR User</h1>
      <p>Create a new HR account and credentials</p>
    </div>

    <div class="form-container">
      <div class="form-wrapper">
        <div *ngIf="!not_available" class="alert alert-success">
          <i class="fas fa-check-circle"></i>
          <span>{{msg}}</span>
        </div>
        <div *ngIf="not_available" class="alert alert-danger">
          <i class="fas fa-exclamation-circle"></i>
          <span>{{msg}}</span>
        </div>

        <form #addemployeeform="ngForm" (ngSubmit)="addHr()">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" name="email" id="email"
              [(ngModel)]="user.email" #email="ngModel"
              [class.is-invalid]="email.invalid && email.touched" required
              placeholder="Enter HR email address">
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" name="password" id="password"
              [(ngModel)]="user.password" #password="ngModel"
              [class.is-invalid]="password.invalid && password.touched" required
              placeholder="Enter secure password">
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/dashboard">
              <i class="fas fa-times"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary"
              [disabled]="addemployeeform.form.invalid">
              <i class="fas fa-check"></i> Add HR User
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
