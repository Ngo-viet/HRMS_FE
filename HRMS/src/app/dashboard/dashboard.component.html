<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRMS Dashboard</title>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Modern Sidebar Menu -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-users"></i>
                </div>
                <h2>HRMS</h2>
                <p>Human Resource Management</p>
            </div>

            <nav class="sidebar-menu">
                <a routerLink="/dashboard" class="menu-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a routerLink="/employeereport" class="menu-item">
                    <i class="fas fa-users"></i>
                    <span>Employee Report</span>
                </a>

                <div class="menu-divider"></div>

                <a routerLink="/leavesreport" class="menu-item">
                    <i class="fas fa-calendar"></i>
                    <span>Leave Report</span>
                </a>

                <div class="menu-divider"></div>

                <a routerLink="/salaryreport" class="menu-item">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Salary Report</span>
                </a>

                <div class="menu-divider"></div>

                <a routerLink="/addhr" class="menu-item">
                    <i class="fas fa-user-tie"></i>
                    <span>Add HR</span>
                </a>

                <a routerLink="" class="menu-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="dashboard-header">
                <h1>Dashboard</h1>
                <p>Welcome to Human Resource Management System</p>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon employees">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Employees</h3>
                        <p class="stat-number">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon leaves">
                        <i class="fas fa-calendar"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Leaves</h3>
                        <p class="stat-number">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon salary">
                        <i class="fas fa-money-bill"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Salaries</h3>
                        <p class="stat-number">0</p>
                    </div>
                </div>
            </div>

            <!-- Quick Access -->
            <div class="quick-access">
                <h2>Quick Access</h2>
                <div class="quick-buttons">
                    <button type="button" routerLink="/employeereport" class="quick-btn">
                        <i class="fas fa-list"></i>
                        <span>View All Employees</span>
                    </button>
                    <button type="button" routerLink="/leavesreport" class="quick-btn">
                        <i class="fas fa-calendar-alt"></i>
                        <span>View Leaves</span>
                    </button>
                    <button type="button" routerLink="/salaryreport" class="quick-btn">
                        <i class="fas fa-chart-bar"></i>
                        <span>View Salaries</span>
                    </button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
