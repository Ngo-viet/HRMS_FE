
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users"></i></div>
      <h2>HRMS</h2>
      <p>Human Resource Management</p>
    </div>
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" class="menu-item">
        <i class="fas fa-chart-line"></i><span>Dashboard</span>
      </a>
      <a routerLink="/employeereport" class="menu-item">
        <i class="fas fa-users-cog"></i><span>Employee Report</span>
      </a>
      <a routerLink="/addemployee" class="menu-item">
        <i class="fas fa-user-plus"></i><span>Add Employee</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/leavesreport" class="menu-item">
        <i class="fas fa-calendar-alt"></i><span>Leaves Report</span>
      </a>
      <a routerLink="/addleaves" class="menu-item">
        <i class="fas fa-calendar-check"></i><span>Add Leaves</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/salaryreport" class="menu-item">
        <i class="fas fa-dollar-sign"></i><span>Salary Report</span>
      </a>
      <a routerLink="/addsalary" class="menu-item">
        <i class="fas fa-coins"></i><span>Add Salary</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/addhr" class="menu-item">
        <i class="fas fa-user-tie"></i><span>Add HR</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/logout" class="menu-item logout">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Update Employee Leaves</h1>
      <p>Modify leave request details for employees</p>
    </div>

    <div class="form-container">
      <div class="form-wrapper">
        <div *ngIf="msg" class="alert alert-success">
          <i class="fas fa-check-circle"></i>
          <span>{{msg}}</span>
        </div>

        <form #editleavesform="ngForm" (ngSubmit)="editLeaves()">
          <input type="hidden" name="lid" [(ngModel)]="leaves.lid" #lid="ngModel">

          <div class="form-group">
            <label for="eid">Employee ID</label>
            <input type="number" class="form-control" name="eid" id="eid"
              [(ngModel)]="leaves.eid" #eid="ngModel"
              [class.is-invalid]="eid.invalid && eid.touched" disabled required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fromDate">From Date</label>
              <input type="date" class="form-control" name="fromDate" id="fromDate"
                [(ngModel)]="leaves.fromDate" #fromDate="ngModel"
                [class.is-invalid]="fromDate.invalid && fromDate.touched" required>
            </div>

            <div class="form-group">
              <label for="toDate">To Date</label>
              <input type="date" class="form-control" name="toDate" id="toDate"
                [(ngModel)]="leaves.toDate" #toDate="ngModel"
                [class.is-invalid]="toDate.invalid && toDate.touched" required>
            </div>
          </div>

          <div class="form-group">
            <label for="leaveResone">Leave Reason</label>
            <input type="text" class="form-control" name="leaveResone" id="leaveResone"
              [(ngModel)]="leaves.leaveResone" #leaveResone="ngModel"
              [class.is-invalid]="leaveResone.invalid && leaveResone.touched" required
              placeholder="Specify reason for leave">
          </div>

          <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea class="form-control" name="description" id="description"
              [(ngModel)]="leaves.description" #description="ngModel"
              placeholder="Add any additional details"
              rows="4"></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/leavesreport">
              <i class="fas fa-times"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary"
              [disabled]="editleavesform.form.invalid">
              <i class="fas fa-save"></i> Update Leave
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
