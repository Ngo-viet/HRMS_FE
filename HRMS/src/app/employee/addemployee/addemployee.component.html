<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users"></i></div>
      <h2>HRMS</h2>
      <p>Human Resource Management</p>
    </div>
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" class="menu-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a routerLink="/employeereport" class="menu-item"><i class="fas fa-users"></i><span>Employee Report</span></a>
      <div class="menu-divider"></div>
      <a routerLink="/leavesreport" class="menu-item"><i class="fas fa-calendar"></i><span>Leave Report</span></a>
      <div class="menu-divider"></div>
      <a routerLink="/salaryreport" class="menu-item"><i class="fas fa-money-bill-wave"></i><span>Salary Report</span></a>
      <div class="menu-divider"></div>
      <a routerLink="/addhr" class="menu-item"><i class="fas fa-user-tie"></i><span>Add HR</span></a>
      <a routerLink="" class="menu-item logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Add New Employee</h1>
      <p>Create a new employee record</p>
    </div>

    <div class="form-container">
      <div class="form-wrapper">
        <form [formGroup]="addEmployeeForm" (ngSubmit)="addEmployee()">
          <div *ngIf="!not_available" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span>{{msg}}</span>
          </div>
          <div *ngIf="not_available" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{msg}}</span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fname">First Name</label>
              <input type="text" class="form-control" id="fname"
                formControlName="firstName"
                [class.is-invalid]="addEmployeeForm.get('firstName')?.invalid && addEmployeeForm.get('firstName')?.touched">
            </div>
            <div class="form-group">
              <label for="lname">Last Name</label>
              <input type="text" class="form-control" id="lname"
                formControlName="lastName"
                [class.is-invalid]="addEmployeeForm.get('lastName')?.invalid && addEmployeeForm.get('lastName')?.touched">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" class="form-control" id="email"
                formControlName="email"
                [class.is-invalid]="addEmployeeForm.get('email')?.invalid && addEmployeeForm.get('email')?.touched">
              <div *ngIf="addEmployeeForm.get('email')?.invalid && addEmployeeForm.get('email')?.touched">
                <small class="text-danger" *ngIf="addEmployeeForm.get('email')?.errors?.['required']">Email is required</small>
                <small class="text-danger" *ngIf="addEmployeeForm.get('email')?.errors?.['pattern']">Enter a valid email</small>
              </div>
            </div>

            <div class="form-group">
              <label for="mobile">Mobile</label>
              <input type="text" class="form-control" id="mobile"
                formControlName="mobile"
                [class.is-invalid]="addEmployeeForm.get('mobile')?.invalid && addEmployeeForm.get('mobile')?.touched"
                placeholder="Enter mobile number">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="department">Department</label>
              <select id="department" class="form-control"
                formControlName="department"
                [class.is-invalid]="addEmployeeForm.get('department')?.invalid && addEmployeeForm.get('department')?.touched">
                <option value="" selected hidden>Choose Department</option>
                <option value="IT Services">IT Services</option>
                <option value="Product Development">Product Development</option>
                <option value="Infrastructure">Infrastructure</option>
                <option value="Sales and Marketing">Sales and Marketing</option>
                <option value="HR">HR</option>
                <option value="Research and Development">Research and Development</option>
                <option value="Account and Finance">Account and Finance</option>
              </select>
            </div>

            <div class="form-group">
              <label for="gender">Gender</label>
              <select id="gender" class="form-control"
                formControlName="gender"
                [class.is-invalid]="addEmployeeForm.get('gender')?.invalid && addEmployeeForm.get('gender')?.touched">
                <option value="" selected hidden>Choose Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fullAddress">Full Address</label>
              <input type="text" class="form-control" id="fullAddress"
                formControlName="fullAddress"
                [class.is-invalid]="addEmployeeForm.get('fullAddress')?.invalid && addEmployeeForm.get('fullAddress')?.touched"
                placeholder="Enter full address">
            </div>

            <div class="form-group">
              <label for="city">City</label>
              <input type="text" class="form-control" id="city"
                formControlName="city"
                [class.is-invalid]="addEmployeeForm.get('city')?.invalid && addEmployeeForm.get('city')?.touched"
                placeholder="Enter city">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="state">State</label>
              <input type="text" class="form-control" id="state"
                formControlName="state"
                [class.is-invalid]="addEmployeeForm.get('state')?.invalid && addEmployeeForm.get('state')?.touched"
                placeholder="Enter state">
            </div>

            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" class="form-control" id="country"
                formControlName="country"
                [class.is-invalid]="addEmployeeForm.get('country')?.invalid && addEmployeeForm.get('country')?.touched"
                placeholder="Enter country">
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/dashboard">
              <i class="fas fa-times"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary"
              [disabled]="addEmployeeForm.invalid">
              <i class="fas fa-check"></i> Add Employee
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
