<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users"></i></div>
      <h2>HRMS</h2>
      <p>Human Resource Management</p>
    </div>
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" class="menu-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a routerLink="/employeereport" class="menu-item"><i class="fas fa-users"></i><span>Employee Report</span></a>
      <a routerLink="/addemployee" class="menu-item active"><i class="fas fa-user-plus"></i><span>Add Employee</span></a>
      <a routerLink="/searchemail" class="menu-item"><i class="fas fa-search"></i><span>Search Employee</span></a>
      <div class="menu-divider"></div>
      <a routerLink="/leavesreport" class="menu-item"><i class="fas fa-calendar"></i><span>Leave Report</span></a>
      <a routerLink="/addleaves" class="menu-item"><i class="fas fa-calendar-plus"></i><span>Add Leave</span></a>
      <div class="menu-divider"></div>
      <a routerLink="/salaryreport" class="menu-item"><i class="fas fa-money-bill-wave"></i><span>Salary Report</span></a>
      <a routerLink="/addsalary" class="menu-item"><i class="fas fa-file-invoice-dollar"></i><span>Add Salary</span></a>
      <div class="menu-divider"></div>
      <a routerLink="/addhr" class="menu-item"><i class="fas fa-user-tie"></i><span>Add HR</span></a>
      <a routerLink="" class="menu-item logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Add New Employee</h1>
      <p>Create a new employee record</p>
    </div>

    <div class="form-container">
      <div class="form-wrapper">
        <form #addemployeeform="ngForm" (ngSubmit)="addEmployee()">
          <div *ngIf="!not_available" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span>{{msg}}</span>
          </div>
          <div *ngIf="not_available" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{msg}}</span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fname">First Name</label>
              <input type="text" class="form-control" name="fname" id="fname"
                [(ngModel)]="employee.firstName" #fname="ngModel"
                [class.is-invalid]="fname.invalid && fname.touched" required>
            </div>
            <div class="form-group">
              <label for="lname">Last Name</label>
              <input type="text" class="form-control" name="lname" id="lname"
                [(ngModel)]="employee.lastName" #lname="ngModel"
                [class.is-invalid]="lname.invalid && lname.touched" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" class="form-control" name="email" id="email"
                [(ngModel)]="employee.email" #email="ngModel"
                [class.is-invalid]="email.invalid && email.touched" required
                pattern="^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$">
              <div *ngIf="email.errors && (email.invalid && email.touched)">
                <small class="text-danger" *ngIf="email.errors?.['required']">Email is required</small>
                <small class="text-danger" *ngIf="email.errors?.['pattern']">Enter a valid email</small>
              </div>
            </div>

            <div class="form-group">
              <label for="mobile">Mobile</label>
              <input type="text" class="form-control" name="mobile" id="mobile"
                [(ngModel)]="employee.mobile" #mobile="ngModel"
                [class.is-invalid]="mobile.invalid && mobile.touched" required
                placeholder="Enter mobile number">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="department">Department</label>
              <select name="department" id="department" class="form-control"
                [(ngModel)]="employee.department" #department="ngModel"
                [class.is-invalid]="department.invalid && department.touched" required>
                <option value="" selected hidden>Choose Department</option>
                <option value="IT Services">IT Services</option>
                <option value="Product Development">Product Development</option>
                <option value="Infrastructure">Infrastructure</option>
                <option value="Sales and Marketing">Sales and Marketing</option>
                <option value="HR">HR</option>
                <option value="Research and Development">Research and Development</option>
                <option value="Account and Finance">Account and Finance</option>
              </select>
            </div>

            <div class="form-group">
              <label for="gender">Gender</label>
              <select name="gender" id="gender" class="form-control"
                [(ngModel)]="employee.gender" #gender="ngModel"
                [class.is-invalid]="gender.invalid && gender.touched" required>
                <option value="" selected hidden>Choose Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fullAddress">Full Address</label>
              <input type="text" class="form-control" name="fullAddress" id="fullAddress"
                [(ngModel)]="employee.fullAddress" #fullAddress="ngModel"
                [class.is-invalid]="fullAddress.invalid && fullAddress.touched" required
                placeholder="Enter full address">
            </div>

            <div class="form-group">
              <label for="city">City</label>
              <input type="text" class="form-control" name="city" id="city"
                [(ngModel)]="employee.city" #city="ngModel"
                [class.is-invalid]="city.invalid && city.touched" required
                placeholder="Enter city">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="state">State</label>
              <input type="text" class="form-control" name="state" id="state"
                [(ngModel)]="employee.state" #state="ngModel"
                [class.is-invalid]="state.invalid && state.touched" required
                placeholder="Enter state">
            </div>

            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" class="form-control" name="country" id="country"
                [(ngModel)]="employee.country" #country="ngModel"
                [class.is-invalid]="country.invalid && country.touched" required
                placeholder="Enter country">
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/dashboard">
              <i class="fas fa-times"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary"
              [disabled]="addemployeeform.form.invalid">
              <i class="fas fa-check"></i> Add Employee
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
