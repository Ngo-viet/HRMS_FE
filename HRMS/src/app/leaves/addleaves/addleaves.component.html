<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users"></i></div>
      <h2>HRMS</h2>
      <p>Human Resource Management</p>
    </div>
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" class="menu-item">
        <i class="fas fa-chart-line"></i><span>Dashboard</span>
      </a>
      <a routerLink="/employeereport" class="menu-item">
        <i class="fas fa-users-cog"></i><span>Employee Report</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/leavesreport" class="menu-item">
        <i class="fas fa-calendar-alt"></i><span>Leaves Report</span>
      </a>
      <a routerLink="/addleaves" class="menu-item active">
        <i class="fas fa-calendar-check"></i><span>Add Leaves</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/salaryreport" class="menu-item">
        <i class="fas fa-dollar-sign"></i><span>Salary Report</span>
      </a>
      <a routerLink="/addsalary" class="menu-item">
        <i class="fas fa-coins"></i><span>Add Salary</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/addhr" class="menu-item">
        <i class="fas fa-user-tie"></i><span>Add HR</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/logout" class="menu-item logout">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Add Employee Leaves</h1>
      <p>Register leave requests for employees</p>
    </div>

    <div class="form-container">
      <div class="form-wrapper">
        <div *ngIf="!not_available" class="alert alert-success">
          <i class="fas fa-check-circle"></i>
          <span>{{msg}}</span>
        </div>
        <div *ngIf="not_available" class="alert alert-danger">
          <i class="fas fa-exclamation-circle"></i>
          <span>{{msg}}</span>
        </div>

        <form [formGroup]="addLeavesForm" (ngSubmit)="addLeaves()">
          <div class="form-group">
            <label for="eid">Employee ID</label>
            <input type="number" class="form-control" id="eid"
              formControlName="eid"
              [class.is-invalid]="addLeavesForm.get('eid')?.invalid && addLeavesForm.get('eid')?.touched"
              placeholder="Enter employee ID">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="fromDate">From Date</label>
              <input type="date" class="form-control" id="fromDate"
                formControlName="fromDate"
                [class.is-invalid]="addLeavesForm.get('fromDate')?.invalid && addLeavesForm.get('fromDate')?.touched">
            </div>

            <div class="form-group">
              <label for="toDate">To Date</label>
              <input type="date" class="form-control" id="toDate"
                formControlName="toDate"
                [class.is-invalid]="addLeavesForm.get('toDate')?.invalid && addLeavesForm.get('toDate')?.touched">
            </div>
          </div>

          <div class="form-group">
            <label for="leaveResone">Leave Reason</label>
            <input type="text" class="form-control" id="leaveResone"
              formControlName="leaveResone"
              [class.is-invalid]="addLeavesForm.get('leaveResone')?.invalid && addLeavesForm.get('leaveResone')?.touched"
              placeholder="Specify reason for leave">
          </div>

          <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea class="form-control" id="description"
              formControlName="description"
              placeholder="Add any additional details"
              rows="4"></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/dashboard">
              <i class="fas fa-times"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary"
              [disabled]="addLeavesForm.invalid">
              <i class="fas fa-check"></i> Add Leave
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
