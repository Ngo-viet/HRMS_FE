<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users"></i></div>
      <h2>HRMS</h2>
      <p>Human Resource Management</p>
    </div>
    <nav class="sidebar-menu">
      <a routerLink="/dashboard" class="menu-item">
        <i class="fas fa-chart-line"></i><span>Dashboard</span>
      </a>
      <a routerLink="/employeereport" class="menu-item">
        <i class="fas fa-users-cog"></i><span>Employee Report</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/leavesreport" class="menu-item">
        <i class="fas fa-calendar-alt"></i><span>Leaves Report</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/salaryreport" class="menu-item">
        <i class="fas fa-dollar-sign"></i><span>Salary Report</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/addhr" class="menu-item">
        <i class="fas fa-user-tie"></i><span>Add HR</span>
      </a>
      <div class="menu-divider"></div>
      <a routerLink="/logout" class="menu-item logout">
        <i class="fas fa-sign-out-alt"></i><span>Logout</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Update Salary Details</h1>
      <p>Modify salary information for employees</p>
    </div>

    <div class="form-container">
      <div class="form-wrapper">
        <div *ngIf="msg" class="alert alert-success">
          <i class="fas fa-check-circle"></i>
          <span>{{msg}}</span>
        </div>

        <form [formGroup]="editSalaryForm" (ngSubmit)="editSalary()">
          <input type="hidden" formControlName="sid">

          <div class="form-row">
            <div class="form-group">
              <label for="eid">Employee ID</label>
              <input type="text" class="form-control" id="eid"
                formControlName="eid"
                [class.is-invalid]="editSalaryForm.get('eid')?.invalid && editSalaryForm.get('eid')?.touched">
            </div>

            <div class="form-group">
              <label for="month">Select Month</label>
              <select id="month" class="form-control"
                formControlName="month"
                [class.is-invalid]="editSalaryForm.get('month')?.invalid && editSalaryForm.get('month')?.touched">
                <option value="" selected hidden>Choose Month</option>
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="twd">Total Working Days</label>
              <input type="number" class="form-control" id="twd" min="1" max="31"
                formControlName="twd"
                [class.is-invalid]="editSalaryForm.get('twd')?.invalid && editSalaryForm.get('twd')?.touched"
                placeholder="1-31">
            </div>

            <div class="form-group">
              <label for="basic">Basic Salary</label>
              <input type="text" class="form-control" id="basic"
                formControlName="basic"
                [class.is-invalid]="editSalaryForm.get('basic')?.invalid && editSalaryForm.get('basic')?.touched"
                placeholder="Enter basic salary">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="hra">Total HRA</label>
              <input type="text" class="form-control" id="hra"
                formControlName="hra"
                [class.is-invalid]="editSalaryForm.get('hra')?.invalid && editSalaryForm.get('hra')?.touched"
                placeholder="Enter HRA amount">
            </div>

            <div class="form-group">
              <label for="ca">Conveyance Allowance</label>
              <input type="text" class="form-control" id="ca"
                formControlName="ca"
                [class.is-invalid]="editSalaryForm.get('ca')?.invalid && editSalaryForm.get('ca')?.touched"
                placeholder="Enter conveyance allowance">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="pay">Total Net Pay</label>
              <input type="text" class="form-control" id="pay"
                formControlName="pay"
                [class.is-invalid]="editSalaryForm.get('pay')?.invalid && editSalaryForm.get('pay')?.touched"
                placeholder="Generated automatically">
            </div>

            <div class="form-group">
              <label for="deduction">Total Deductions</label>
              <input type="text" class="form-control" id="deduction"
                formControlName="deduction"
                [class.is-invalid]="editSalaryForm.get('deduction')?.invalid && editSalaryForm.get('deduction')?.touched"
                placeholder="Enter total deductions">
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" routerLink="/salaryreport">
              <i class="fas fa-times"></i> Cancel
            </button>
            <button type="submit" class="btn btn-primary"
              [disabled]="editSalaryForm.invalid">
              <i class="fas fa-save"></i> Update Salary
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
